parameters:
  RISCV_FORMAL:
    datatype: bool
    paramtype: vlogdefine
  SERV_CLEAR_RAM:
    datatype: bool
    paramtype: vlogdefine
    default: true
  heartbeat:
    datatype: int
    paramtype: plusarg
    description: Display a heartbeat message every n*heartbeat time unit
  tapfile:
    datatype: str
    paramtype: plusarg
    description: Name of TAP file
  testcase:
    datatype: str
    paramtype: plusarg
    description: Name of testcase (Used for VCD filename)
  timeout:
    datatype: int
    paramtype: plusarg
    description: Abort test case after n cycles
  vcd:
    datatype: bool
    paramtype: plusarg
    description: Enable VCD logging
    default: true
  width:
    datatype: int
    paramtype: vlogparam
    description: Interal datapath width (1=SERV, 4=QERV)
  firmware:
    datatype: file
    paramtype: plusarg
    description: Preload RAM with a hex file at runtime (overrides memfile)
    default: /home/rory/riscv_benchmark/serv_project/test_lw_cycles.hex
  memsize:
    datatype: int
    paramtype: vlogparam
    description: Memory size in bytes for RAM (default 8kiB)
    default: 8192
tool_options:
  icarus: {}
filters: []
flow_options: {}
hooks: {}
